name: myitihas
description: "MyItihas - Explore Indian heritage, history, and sacred sites through curated stories, interactive maps, and personalized AI-powered narratives."
publish_to: 'none'

version: 1.0.4+12

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Core / Infrastructure
  brick_core: ^2.1.0
  brick_sqlite: ^4.1.0+1
  brick_supabase: ^2.1.1
  brick_offline_first: ^4.0.2
  brick_offline_first_with_supabase: ^2.1.0
  sqflite_common: ^2.5.6
  sqflite: ^2.4.2
  supabase_flutter: ^2.12.0

  # State Management & Architecture
  bloc: ^9.2.0
  flutter_bloc: ^9.1.1
  get_it: ^9.2.0
  injectable: ^2.7.1+4
  fpdart: ^1.2.0
  equatable: ^2.0.8
  freezed_annotation: ^3.1.0
  json_annotation: ^4.10.0

  # Routing
  go_router: ^17.1.0

  # Storage & Preferences
  shared_preferences: ^2.5.4
  envied: ^1.3.2

  # Networking
  dio: ^5.9.1
  connectivity_plus: ^7.0.0
  internet_connection_checker_plus: ^2.9.1+2

  # UI & Design
  iconsax:
  google_fonts: ^8.0.1
  flutter_screenutil: ^5.9.3
  sizer: ^3.1.3
  cached_network_image: ^3.4.1
  flutter_svg: ^2.2.3
  shimmer: ^3.0.0
  font_awesome_flutter: ^10.12.0
  smooth_page_indicator: ^2.0.1
  gradient_borders: ^1.0.2
  smooth_sheets:
    git:
      url: https://github.com/fujidaiti/smooth_sheets.git
  carousel_slider: ^5.1.2
  percent_indicator: ^4.2.5
  flutter_slidable: ^4.0.3

  # Internationalization
  slang: ^4.12.1
  slang_flutter: ^4.12.1
  intl: ^0.20.2

  # Logging
  talker: ^5.1.13
  talker_flutter: ^5.1.13
  talker_bloc_logger: ^5.1.13
  talker_dio_logger: ^5.1.13

  # Media & Files
  image_picker: ^1.2.1
  file_picker: ^10.3.2
  flutter_image_compress: ^2.4.0
  image_cropper: ^11.0.0
  video_player: ^2.10.1
  video_trimmer: ^5.0.0
  flutter_cache_manager: ^3.4.1
  path_provider: ^2.1.5
  path: ^1.9.1
  flutter_file_dialog: ^3.0.3
  flutter_tts: ^4.2.5
  just_audio: ^0.10.4
  permission_handler: ^12.0.1
  image_gallery_saver_plus: ^4.0.1

  # Maps & Location
  google_maps_flutter: ^2.14.0
  geolocator: ^14.0.2

  # Markdown & Rich Text
  flutter_markdown_plus: ^1.0.7
  markdown: ^7.3.0
  flutter_widget_from_html: ^0.17.1

  # Social & Sharing
  share_plus: ^12.0.1
  url_launcher: ^6.3.2
  app_links: ^6.4.1
  google_sign_in: ^7.2.0
  sign_in_with_apple: ^7.0.1

  # Utilities
  uuid: ^4.5.2
  timeago: ^3.7.1
  jiffy: ^6.4.4
  firebase_core: ^4.4.0
  firebase_messaging: ^16.1.1
  flutter_local_notifications: ^20.0.0
  speech_to_text: ^7.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

  flutter_lints: ^6.0.0
  build_runner: ^2.11.0
  flutter_launcher_icons: ^0.13.1

  # Routing (code generation)
  go_router_builder: ^4.2.0

  # DI / Models / Serialization
  freezed: ^3.2.5
  json_serializable: ^6.12.0
  injectable_generator: ^2.12.0

  # i18n + storage
  slang_build_runner: ^4.12.1
  brick_offline_first_with_supabase_build: ^2.1.0
  icons_launcher: ^3.0.3
  envied_generator: ^1.3.2
  change_app_package_name: ^1.5.0

icons_launcher:
  platforms:
    android:
      enable: false
    ios:
      enable: true
      image_path: "assets/icon.png"
    web:
      enable: true
      image_path: "assets/icon.png"
      favicon_path: "assets/favicon.png"

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  remove_alpha_ios: true


flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/images/
    - assets/data/
    - docs/dataset.json
